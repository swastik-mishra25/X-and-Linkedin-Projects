<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Expense & Consumption Tracker</h1>
    </header>

    <main class="container">
        
        <section class="input-panel">
            
            <div class="card">
                <h2>Log Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="exp-amount">Amount ($)</label>
                        <input type="number" id="exp-amount" required min="1">
                    </div>
                    <div class="form-group">
                        <label for="exp-category">Category</label>
                        <select id="exp-category" required>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Utilities">Utilities</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="exp-date">Date</label>
                        <input type="date" id="exp-date" required>
                    </div>
                    <button type="submit">Add Expense</button>
                </form>
            </div>

            <div class="card">
                <h2>Log Consumption</h2>
                <form id="consumption-form">
                    <div class="form-group">
                        <label for="con-quantity">Quantity</label>
                        <input type="number" id="con-quantity" required min="1">
                    </div>
                    <div class="form-group">
                        <label for="con-unit">Unit</label>
                        <select id="con-unit" required>
                            <option value="kWh">Electricity (kWh)</option>
                            <option value="Liters">Fuel (Liters)</option>
                            <option value="kg">Weight (kg)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="con-date">Date</label>
                        <input type="date" id="con-date" required>
                    </div>
                    <button type="submit">Add Consumption</button>
                </form>
            </div>
        </section>

        <section class="dashboard">
            
            <div class="summary-cards">
                <div class="card summary-card">
                    <h3>Total Expenses</h3>
                    <h2 id="total-expense">$0</h2>
                </div>
                <div class="card summary-card">
                    <h3>Total Consumption</h3>
                    <h2 id="total-consumption">0 Units</h2>
                </div>
            </div>

            <div class="card">
                <h3>Budget Limit ($1000)</h3>
                <div class="budget-track">
                    <div class="budget-fill" id="budget-fill"></div>
                </div>
            </div>

            <div class="card history-section">
                <h3>Recent History</h3>
                <ul id="history-list" class="history-list">
                    </ul>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
